name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip -d cmdline-tools
        mkdir -p android-sdk
        mv cmdline-tools android-sdk/
        export ANDROID_HOME=$PWD/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/bin
        yes | sdkmanager --licenses
        sdkmanager "platforms;android-29" "build-tools;29.0.3"

    - name: Build APK
      run: |
        export ANDROID_HOME=$PWD/android-sdk
        export PATH=$PATH:$ANDROID_HOME/build-tools/29.0.3
        mkdir -p ~/.android
        keytool -genkey -v -keystore ~/.android/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US" -storepass android -keypass android
        aapt package -f -M app/src/main/AndroidManifest.xml -S app/src/main/res -I $ANDROID_HOME/platforms/android-29/android.jar -F base.apk
        javac -d . -cp $ANDROID_HOME/platforms/android-29/android.jar app/src/main/java/com/instagram/lite/*.java
        dx --dex --output classes.dex .
        aapt add base.apk classes.dex
        apksigner sign --ks ~/.android/debug.keystore --ks-pass pass:android base.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: InstaLite-APK
        path: base.apk
